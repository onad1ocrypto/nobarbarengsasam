<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobar Bareng Sasam</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.logo{
font-size:70px;
margin-bottom:10px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

.subtitle{
color:#cbd5e1;
margin-bottom:30px;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:30px;
}

.box{
background:rgba(0,0,0,0.25);
padding:20px;
border-radius:15px;
}

.box span{
display:block;
font-size:32px;
font-weight:bold;
}

.box small{
color:#94a3b8;
}

.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.btn{
padding:15px 25px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:white;
transition:.3s;
}

.live{
background:#22c55e;
}

.schedule{
background:#2563eb;
}

.xbtn{
background:#000;
}

.btn:hover{
transform:translateY(-2px);
}

.info{
margin-top:20px;
color:#cbd5e1;
line-height:1.7;
}

.footer{
margin-top:40px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.15);
font-size:15px;
}

.footer a{
color:#93c5fd;
text-decoration:none;
font-weight:bold;
}

@media(max-width:700px){

h1{
font-size:34px;
}

.countdown{
grid-template-columns:repeat(2,1fr);
}

.card{
padding:25px;
}

}
</style>
</head>

<body>

<div class="card">

<div class="logo">⚽</div>

<h1>Nobar Bareng Sasam</h1>

<p class="subtitle">
Tempat santai untuk akses live TV dan info pertandingan.
</p>

<div class="countdown">

<div class="box">
<span id="days">0</span>
<small>Hari</small>
</div>

<div class="box">
<span id="hours">0</span>
<small>Jam</small>
</div>

<div class="box">
<span id="minutes">0</span>
<small>Menit</small>
</div>

<div class="box">
<span id="seconds">0</span>
<small>Detik</small>
</div>

</div>

<div class="buttons">

<a class="btn live"
href="https://world-cup-2026-streaming.blogspot.com/live-tv-185-fox-sports-1.html"
target="_blank">
📺 Buka Live TV
</a>

<a class="btn schedule"
href="https://www.google.com/search?q=world+cup+2026+schedule"
target="_blank">
📅 Jadwal Pertandingan
</a>

<a class="btn xbtn"
href="https://x.com/onadeonft"
target="_blank">
🐦 Follow X
</a>

</div>

<div class="info">
Nikmati pertandingan favoritmu dan jangan lupa bagikan website ini ke teman-teman nobar.
</div>

<div class="footer">

Created by
<a href="https://x.com/onadeonft" target="_blank">
@onadeonft
</a>

<br><br>

☕ Support:
<a href="https://saweria.co/sasam" target="_blank">
Saweria Sasam
</a>

</div>

</div>

<script>

const targetDate = new Date("June 11, 2026 00:00:00").getTime();

setInterval(() => {

const now = new Date().getTime();
const distance = targetDate - now;

document.getElementById("days").innerHTML =
Math.floor(distance/(1000*60*60*24));

document.getElementById("hours").innerHTML =
Math.floor((distance%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutes").innerHTML =
Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("seconds").innerHTML =
Math.floor((distance%(1000*60))/1000);

},1000);

</script>

</body>
</html>
